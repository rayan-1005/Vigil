version: '3.9'

services:
  api:
    build: .
    ports:
      - '3001:3001'
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       upiguard_db
      POSTGRES_USER:     upiguard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-REPLACE_WITH_STRONG_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U upiguard -d upiguard_db']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - '6379:6379'

volumes:
  pg_data:
  redis_data:
